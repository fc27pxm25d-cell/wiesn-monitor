name: Wiesn-Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: wiesn-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Browser cachen
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Browser installieren
        run: python -m playwright install --with-deps chromium

      - name: Monitor ausfuehren
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Stand sichern
        run: |
          git config user.name "wiesn-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git commit -m "state update" || echo "keine Aenderung"
          git push || echo "nichts zu pushen"
